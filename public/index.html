<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trace Consumer 数据仪表盘</title>
  <meta name="description" content="IoT Trace 数据实时可视化仪表盘">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /* ============= CSS Reset & Variables ============= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary:    #0b0e17;
      --bg-secondary:  #111827;
      --bg-card:       #1a1f35;
      --bg-card-hover: #222842;
      --border:        rgba(99, 115, 171, 0.15);
      --border-glow:   rgba(99, 179, 237, 0.25);
      --text-primary:  #e2e8f0;
      --text-secondary:#94a3b8;
      --text-muted:    #64748b;
      --accent-blue:   #3b82f6;
      --accent-cyan:   #06b6d4;
      --accent-purple: #8b5cf6;
      --accent-emerald:#10b981;
      --accent-amber:  #f59e0b;
      --accent-rose:   #f43f5e;
      --gradient-1:    linear-gradient(135deg, #3b82f6, #8b5cf6);
      --gradient-2:    linear-gradient(135deg, #06b6d4, #10b981);
      --gradient-3:    linear-gradient(135deg, #f59e0b, #f43f5e);
      --shadow-card:   0 4px 24px rgba(0,0,0,0.3), 0 0 0 1px var(--border);
      --shadow-glow:   0 0 20px rgba(59, 130, 246, 0.15);
      --radius:        12px;
      --radius-sm:     8px;
      --font:          'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html { font-size: 14px; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ============= Background Glow ============= */
    body::before {
      content: '';
      position: fixed;
      top: -40%; left: -20%;
      width: 80%; height: 80%;
      background: radial-gradient(ellipse, rgba(59,130,246,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -30%; right: -10%;
      width: 60%; height: 70%;
      background: radial-gradient(ellipse, rgba(139,92,246,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ============= Header ============= */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11,14,23,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .header-inner {
      max-width: 1600px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; font-size: 1.1rem;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--gradient-1);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .status-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 20px;
      font-size: 0.8rem; font-weight: 500;
      color: var(--accent-emerald);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-emerald);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50%      { opacity: 0.7; box-shadow: 0 0 0 6px rgba(16,185,129,0); }
    }

    /* ============= Main Layout ============= */
    .main {
      max-width: 1600px; margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      position: relative;
      z-index: 1;
    }

    /* ============= Stats Cards ============= */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .stat-card:hover {
      border-color: var(--border-glow);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .stat-card:nth-child(1)::before { background: var(--gradient-1); }
    .stat-card:nth-child(2)::before { background: var(--gradient-2); }
    .stat-card:nth-child(3)::before { background: var(--gradient-3); }
    .stat-card:nth-child(4)::before { background: linear-gradient(135deg, #8b5cf6, #06b6d4); }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .stat-sub {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.3rem;
    }
    .stat-card:nth-child(1) .stat-value { color: var(--accent-blue); }
    .stat-card:nth-child(2) .stat-value { color: var(--accent-emerald); }
    .stat-card:nth-child(3) .stat-value { color: var(--accent-amber); }
    .stat-card:nth-child(4) .stat-value { color: var(--accent-purple); }

    
    /* ============= Data Table ============= */
    .table-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .table-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.4rem;
      border-bottom: 1px solid var(--border);
    }
    .table-title {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .table-controls {
      display: flex; align-items: center; gap: 0.8rem;
    }
    .toggle-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.78rem;
      transition: all 0.2s;
    }
    .toggle-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
    .toggle-btn.active {
      background: rgba(59,130,246,0.1);
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* Virtual Scroll Container */
    .table-viewport {
      height: 500px;
      overflow-y: auto;
      position: relative;
    }
    .table-viewport::-webkit-scrollbar { width: 6px; }
    .table-viewport::-webkit-scrollbar-track { background: transparent; }
    .table-viewport::-webkit-scrollbar-thumb {
      background: rgba(99,115,171,0.3);
      border-radius: 3px;
    }
    .table-viewport::-webkit-scrollbar-thumb:hover { background: rgba(99,115,171,0.5); }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      position: sticky; top: 0; z-index: 2;
    }
    thead th {
      background: var(--bg-secondary);
      padding: 0.6rem 1rem;
      text-align: right;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; }

    tbody td {
      padding: 0.45rem 1rem;
      text-align: right;
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
      border-bottom: 1px solid rgba(99,115,171,0.06);
      white-space: nowrap;
    }
    tbody td:first-child {
      text-align: left;
      color: var(--text-muted);
      font-weight: 500;
    }
    tbody tr:hover {
      background: var(--bg-card-hover);
    }

    /* ============= Empty State ============= */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }
    .empty-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    .empty-state p { font-size: 0.9rem; }

    /* ============= Connection Status ============= */
    .conn-status {
      position: fixed; bottom: 20px; right: 20px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.75rem; font-weight: 500;
      z-index: 200;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .conn-status.connected {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: var(--accent-emerald);
    }
    .conn-status.disconnected {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      color: var(--accent-rose);
    }
    .conn-status.connecting {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--accent-amber);
    }

    /* ============= Responsive ============= */
    @media (max-width: 1200px) {
      .stats-grid   { grid-template-columns: repeat(2, 1fr); }
      .charts-grid  { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .stats-grid   { grid-template-columns: 1fr; }
      .main         { padding: 1rem; }
      .header       { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">📡</div>
        <span>Trace Consumer</span>
      </div>
      <div class="status-badge" id="amqpStatus">
        <span class="status-dot"></span>
        <span>实时接收中</span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">总接收帧数</div>
        <div class="stat-value" id="statTotal">0</div>
        <div class="stat-sub" id="statRate">0 帧/秒</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">接收批次</div>
        <div class="stat-value" id="statBatches">0</div>
        <div class="stat-sub" id="statAvgBatch">平均 0 帧/批</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">内存缓存</div>
        <div class="stat-value" id="statMemory">0</div>
        <div class="stat-sub" id="statMemMax">帧</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">运行时间</div>
        <div class="stat-value" id="statUptime">0s</div>
        <div class="stat-sub" id="statDevice">-</div>
      </div>
    </div>

    
    <!-- Data Table -->
    <div class="table-section">
      <div class="table-header">
        <div class="table-title">📋 实时数据流</div>
        <div class="table-controls">
          <button class="toggle-btn active" id="btnAutoScroll" onclick="toggleAutoScroll()">
            ↓ 自动滚动
          </button>
          <button class="toggle-btn" id="btnPause" onclick="togglePause()">
            ⏸ 暂停
          </button>
          <span style="color: var(--text-muted); font-size: 0.75rem;" id="tableInfo">0 行</span>
        </div>
      </div>
      <div class="table-viewport" id="tableViewport">
        <table>
          <thead id="tableHead">
            <tr>
              <th>#</th>
              <th>ts</th>
              <th>axis1_position</th>
              <th>axis1_velocity</th>
              <th>axis1_torque</th>
              <th>motor_rpm</th>
              <th>pressure_bar</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">📡</div>
          <p>等待数据到达...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Connection Status -->
  <div class="conn-status connecting" id="connStatus">● 连接中...</div>
  
  <!-- Performance Warning -->
  <div id="perfWarning" style="display:none; position:fixed; top:80px; right:20px; padding:12px 20px; background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.4); border-radius:8px; color:#f59e0b; font-size:0.85rem; z-index:200; backdrop-filter:blur(10px);">
    ⚠️ 性能降级模式已启用
  </div>

  <script>
    // ============= 配置 =============
    const TABLE_MAX_ROWS   = 500;         // DOM中最多保留500行（核心：减少DOM节点数）
    const RENDER_BATCH     = 100;         // 每次rAF渲染100行（大批量快速排空队列）
    const MAX_PENDING      = 3000;        // 待渲染队列上限

    // ============= 状态 =============
    let totalRowCount = 0;                // 总行数计数器（替代allRows数组，零GC）
    let pendingRows   = [];               // 待渲染队列
    let autoScroll    = true;
    let paused        = false;
    let lastDevice    = '-';
    let frameRateCounter = 0;
    let lastRateTime  = Date.now();

    // DOM refs（缓存一次，避免重复查询）
    const tableBody     = document.getElementById('tableBody');
    const tableViewport = document.getElementById('tableViewport');
    const emptyState    = document.getElementById('emptyState');
    const connStatus    = document.getElementById('connStatus');
    const perfWarning   = document.getElementById('perfWarning');
    const elStatTotal   = document.getElementById('statTotal');
    const elStatBatches = document.getElementById('statBatches');
    const elStatMemory  = document.getElementById('statMemory');
    const elStatMemMax  = document.getElementById('statMemMax');
    const elStatUptime  = document.getElementById('statUptime');
    const elStatAvgBatch= document.getElementById('statAvgBatch');
    const elStatRate    = document.getElementById('statRate');
    const elStatDevice  = document.getElementById('statDevice');
    const elTableInfo   = document.getElementById('tableInfo');

    // ============= 行模板 =============
    const rowTemplate = document.createElement('tr');
    rowTemplate.innerHTML = '<td></td><td></td><td></td><td></td><td></td><td></td><td></td>';

    // ============= 渲染引擎 =============
    let rafPending = false;

    function scheduleRender() {
      if (rafPending || paused) return;
      rafPending = true;
      requestAnimationFrame(renderBatch);
    }

    function renderBatch() {
      rafPending = false;
      if (pendingRows.length === 0) return;

      // 队列过长时截断旧数据
      if (pendingRows.length > MAX_PENDING) {
        pendingRows = pendingRows.slice(-MAX_PENDING);
      }

      // 大批量渲染：一次rAF处理尽可能多的行
      const batch = pendingRows.splice(0, RENDER_BATCH);
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < batch.length; i++) {
        const row = batch[i];
        const tr = rowTemplate.cloneNode(true);
        const cells = tr.cells;
        cells[0].textContent = String(row._idx);
        cells[1].textContent = fmt(row.ts);
        cells[2].textContent = fmt(row.axis1_position);
        cells[3].textContent = fmt(row.axis1_velocity);
        cells[4].textContent = fmt(row.axis1_torque);
        cells[5].textContent = fmt(row.motor_rpm);
        cells[6].textContent = fmt(row.pressure_bar);
        fragment.appendChild(tr);
      }

      tableBody.appendChild(fragment);

      // 裁剪旧DOM节点
      while (tableBody.children.length > TABLE_MAX_ROWS) {
        tableBody.removeChild(tableBody.firstChild);
      }

      // 更新信息
      elTableInfo.textContent = `${totalRowCount} 行`;

      // 还有待渲染 → 继续，但只在队列排空后才滚动（避免反复reflow）
      if (pendingRows.length > 0) {
        scheduleRender();
      } else {
        // 队列排空，执行一次滚动
        if (autoScroll) {
          tableViewport.scrollTop = tableViewport.scrollHeight;
        }
      }
    }

    function fmt(v) {
      if (v == null || v === undefined) return '-';
      if (typeof v === 'number') {
        return Number.isInteger(v) ? String(v) : v.toFixed(3);
      }
      return String(v);
    }

    // ============= Stats Update =============
    function updateStats(stats) {
      if (!stats) return;
      elStatTotal.textContent = stats.totalReceived.toLocaleString();
      elStatBatches.textContent = stats.batchCount.toLocaleString();
      elStatMemory.textContent = stats.inMemory.toLocaleString();
      elStatMemMax.textContent = '帧';

      const uptime = stats.uptimeSec;
      const h = Math.floor(uptime / 3600);
      const m = Math.floor((uptime % 3600) / 60);
      const s = uptime % 60;
      elStatUptime.textContent =
        h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`;

      if (stats.batchCount > 0) {
        const avg = Math.round(stats.totalReceived / stats.batchCount);
        elStatAvgBatch.textContent = `平均 ${avg} 帧/批`;
      }
    }

    // 帧率统计
    setInterval(() => {
      const now = Date.now();
      const elapsed = (now - lastRateTime) / 1000;
      const rate = Math.round(frameRateCounter / elapsed);
      elStatRate.textContent = `${rate} 帧/秒`;
      frameRateCounter = 0;
      lastRateTime = now;
    }, 2000);

    // ============= WebSocket =============
    let ws = null;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);

      ws.onopen = () => {
        connStatus.className = 'conn-status connected';
        connStatus.textContent = '● 已连接';
      };

      ws.onclose = () => {
        connStatus.className = 'conn-status disconnected';
        connStatus.textContent = '● 已断开，重连中...';
        setTimeout(connect, 2000);
      };

      ws.onerror = () => {};

      ws.onmessage = (evt) => {
        const msg = JSON.parse(evt.data);

        if (msg.event === 'init') {
          const { stats, recent } = msg.data;
          updateStats(stats);
          emptyState.style.display = recent.length ? 'none' : '';

          for (const f of recent) {
            totalRowCount++;
            f._idx = totalRowCount;
            pendingRows.push(f);
          }
          scheduleRender();
          if (recent.length > 0) {
            lastDevice = recent[recent.length - 1]._device || '-';
            elStatDevice.textContent = `设备: ${lastDevice}`;
          }
        }

        if (msg.event === 'batch') {
          const { frames, stats, device } = msg.data;
          updateStats(stats);
          emptyState.style.display = 'none';

          frameRateCounter += frames.length;
          lastDevice = device || lastDevice;
          elStatDevice.textContent = `设备: ${lastDevice}`;

          for (const f of frames) {
            totalRowCount++;
            f._idx = totalRowCount;
            pendingRows.push(f);
          }

          scheduleRender();
        }
      };
    }

    connect();

    // ============= Controls =============
    function toggleAutoScroll() {
      autoScroll = !autoScroll;
      const btn = document.getElementById('btnAutoScroll');
      btn.classList.toggle('active', autoScroll);
    }

    function togglePause() {
      paused = !paused;
      const btn = document.getElementById('btnPause');
      btn.classList.toggle('active', paused);
      btn.innerHTML = paused ? '▶ 继续' : '⏸ 暂停';
      if (!paused && pendingRows.length > 0) {
        scheduleRender();
      }
    }
  </script>
</body>
</html>
